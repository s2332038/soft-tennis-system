<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>失点記録</title>

    <link rel="stylesheet"
          href="../style.css">

</head>

<body>

<div class="container">

    <h1>失点記録</h1>

    <!-- スコア表示 -->

    <div class="score-board">

        <div class="score-box">

            <h2>ゲームカウント</h2>

            <div id="gameCount">
                0 : 0
            </div>

        </div>

        <div class="score-box">

            <h2>ポイント</h2>

            <div id="pointCount">
                0 : 0
            </div>

        </div>

    </div>

    <!-- 失点した人 -->

    <div class="card">

        <h2>失点した人</h2>

        <div class="button-row">

            <button
                class="btn player-btn"
                data-value="後衛">

                後衛

            </button>

            <button
                class="btn player-btn"
                data-value="前衛">

                前衛

            </button>

            <button
                class="btn player-btn"
                data-value="なし">

                なし

            </button>

        </div>

    </div>

    <!-- 失点要因 -->

    <div class="card">

        <h2>失点要因</h2>

        <div class="button-grid">

            <button class="btn reason-btn" data-value="ダブルフォルト">
                ダブルフォルト
            </button>

            <button class="btn reason-btn" data-value="レシーブミス">
                レシーブミス
            </button>

            <button class="btn reason-btn" data-value="ネット">
                ネット
            </button>

            <button class="btn reason-btn" data-value="アウト">
                アウト
            </button>

            <button class="btn reason-btn" data-value="チャンスボールミス">
                チャンスボールミス
            </button>

            <button class="btn reason-btn" data-value="仕掛けてミス">
                仕掛けてミス
            </button>

            <button class="btn reason-btn" data-value="相手のボレー">
                相手のボレー
            </button>

            <button class="btn reason-btn" data-value="相手の決め球">
                相手の決め球
            </button>

            <button class="btn reason-btn" data-value="浅い球ミス">
            浅い球ミス
            </button>

            <button class="btn reason-btn" data-value="ボレーミス">
                ボレーミス
            </button>
            

        </div>

        <div class="form-group">

            <label>
                その他
            </label>

            <input
                type="text"
                id="otherReason"
                placeholder="自由入力">

        </div>

    </div>

    <!-- 操作ボタン -->

    <div class="button-row">

        <button
            class="btn next-btn"
            onclick="saveLosePoint()">

            次のポイントへ

        </button>

    </div>

    <div class="button-row">

        <button
            class="btn red-btn"
            onclick="abortMatch()">

            記録リセット

        </button>

    </div>

</div>

<script src="../script.js"></script>

<script>

updateScoreBoard();

/* 失点した人 */

document
.querySelectorAll(".player-btn")
.forEach(btn => {

    btn.addEventListener("click", () => {

        document
        .querySelectorAll(".player-btn")
        .forEach(b =>
            b.classList.remove("active")
        );

        btn.classList.add("active");

        sessionStorage.setItem(
            "loser",
            btn.dataset.value
        );

    });

});

/* 失点要因 */

document
.querySelectorAll(".reason-btn")
.forEach(btn => {

    btn.addEventListener("click", () => {

        document
        .querySelectorAll(".reason-btn")
        .forEach(b =>
            b.classList.remove("active")
        );

        btn.classList.add("active");

        sessionStorage.setItem(
            "loseReason",
            btn.dataset.value
        );

    });

});

</script>

</body>
</html>
